name: UI Freeze Guard

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/ui-freeze.yml'
      - 'AGENTS.md'
      - 'src/ui/**'
      - 'tools/enforce_ui_freeze.sh'
  pull_request:
    paths:
      - '.github/workflows/ui-freeze.yml'
      - 'AGENTS.md'
      - 'src/ui/**'
      - 'tools/enforce_ui_freeze.sh'

jobs:
  ui-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce retail UI immutability
        run: tools/enforce_ui_freeze.sh
