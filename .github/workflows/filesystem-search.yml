name: Filesystem Search Paths

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/filesystem-search.yml'
      - 'tests/test_fs_search_paths.py'
      - 'tests/fs_searchpath_harness.c'
      - 'src/code/qcommon/**'
      - 'src/code/game/q_shared.h'
  pull_request:
    paths:
      - '.github/workflows/filesystem-search.yml'
      - 'tests/test_fs_search_paths.py'
      - 'tests/fs_searchpath_harness.c'
      - 'src/code/qcommon/**'
      - 'src/code/game/q_shared.h'

jobs:
  fs-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pytest
      - name: Run filesystem search path tests
        run: pytest tests/test_fs_search_paths.py -q
